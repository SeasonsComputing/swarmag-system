<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Your swarmAg sign-in code</title>
  </head>
  <body style="font-family: sans-serif; background: #f5f5f5; margin: 0; padding: 32px;">
    <table width="100%" cellpadding="0" cellspacing="0" style="max-width: 480px; margin: 0 auto;">
      <tr>
        <td style="background: #ffffff; border-radius: 8px; padding: 40px; text-align: center;">
          <p style="margin: 0 0 8px; font-size: 14px; color: #666;">swarmAg Operations System</p>
          <h1 style="margin: 0 0 32px; font-size: 20px; color: #111;">Your sign-in code</h1>
          <p
            style="
              display: inline-block;
              margin: 0 0 32px;
              padding: 16px 32px;
              background: #f0f0f0;
              border-radius: 6px;
              font-size: 36px;
              font-weight: bold;
              letter-spacing: 8px;
              color: #111;
            "
          >
            {{ .Token }}
          </p>
          <p style="margin: 0 0 8px; font-size: 14px; color: #444;">
            Enter this code on the sign-in screen. It expires in 1 hour.
          </p>
          <p style="margin: 0; font-size: 12px; color: #999;">
            If you did not request this code, you can safely ignore this email.
          </p>
          <p style="margin: 16px 0 0; font-size: 10px; color: #ccc;">(version: 0.0.4)</p>
        </td>
      </tr>
    </table>
  </body>
</html>
