# Netlify deployment configuration for swarmag-app-ops

# SPA fallback — all routes serve index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# index.html — never cache; always fetch latest
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-store"

# Hashed assets — cache forever (content hash changes on rebuild)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Service worker — never cache
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-store"
